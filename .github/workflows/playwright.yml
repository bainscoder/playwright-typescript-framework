name: Playwright Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout History Branch
        uses: actions/checkout@v4
        with:
          ref: gh-dashboard
          path: history
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Restore Previous Execution History
        run: |
          mkdir -p execution-data

          if [ -f history/execution-data/execution-history.json ]; then
            cp history/execution-data/execution-history.json execution-data/
            echo "Previous history restored"
          else
            echo "No previous history found"
          fi

      - name: Verify Restored History
        run: |
          echo "===== HISTORY ====="

          if [ -f execution-data/execution-history.json ]; then
            cat execution-data/execution-history.json
          else
            echo "History file missing"
          fi

      - name: Run Playwright Tests
        run: npx playwright test

      - name: Verify Generated Files
        if: always()
        run: |
          echo "===== EXECUTION DATA ====="
          ls -la execution-data || true

          echo ""
          echo "===== PLAYWRIGHT REPORT ====="
          ls -la playwright-report || true

      - name: Save Updated History
        if: always()
        run: |
          mkdir -p history/execution-data

          if [ -f execution-data/execution-history.json ]; then
            cp execution-data/execution-history.json history/execution-data/

            cd history

            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            git add execution-data/execution-history.json

            git commit -m "Update execution history" || echo "No changes"

            git push origin gh-dashboard
          else
            echo "execution-history.json not found"
          fi

      - name: Create Site Structure
        if: always()
        run: |
          mkdir -p site/playwright
          mkdir -p site/dashboard

          cp -R playwright-report/* site/playwright/
          cp -R execution-data/* site/dashboard/

      - name: Create Home Page
        if: always()
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Playwright Automation Reports</title>
          </head>
          <body>
              <h1>Playwright Automation Reports</h1>

              <ul>
                  <li>
                      <a href="./playwright/index.html">
                          Playwright Report
                      </a>
                  </li>

                  <li>
                      <a href="./dashboard/execution-dashboard.html">
                          Execution Dashboard
                      </a>
                  </li>
              </ul>

          </body>
          </html>
          EOF

      - name: Upload GitHub Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload Playwright Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

  deploy:
    needs: test
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4